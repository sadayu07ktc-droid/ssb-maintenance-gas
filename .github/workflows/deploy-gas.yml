name: Deploy Backend (GAS)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install clasp
        run: npm install -g @google/clasp@2.4.2

      - name: Restore clasp auth
        run: printf '%s' '${{ secrets.CLASPRC_JSON }}' > ~/.clasprc.json

      - name: Push code to Apps Script
        run: clasp push -f

      - name: Redeploy web app (same /exec URL)
        run: clasp deploy -i AKfycbyZtA5-kmSEyFsItnlfsLbEip2sUQ3VQ__HTwxuUrBCFbH2XDFZIZbohnICTLD2LKao -d "auto ${{ github.sha }}"
